<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0a0a0a" />
  <title>baton-web</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css"
  />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0a;
      --fg: #f5f5f5;
      --accent: #6366f1;
      --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--fg); }
    body {
      display: flex;
      flex-direction: column;
      font: 14px/1.4 -apple-system, system-ui, sans-serif;
      overflow: hidden;
    }
    header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #111;
      border-bottom: 1px solid #222;
      font-size: 12px;
    }
    header .title {
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    header .status {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 11px;
      color: #999;
    }
    header .status.connected { color: #4ade80; }
    header .status.disconnected { color: var(--error); }
    #term-host {
      flex: 1 1 auto;
      min-height: 0;
      padding: 4px;
      background: var(--bg);
    }
    #term-host .xterm,
    #term-host .xterm-viewport,
    #term-host .xterm-screen {
      height: 100% !important;
      width: 100% !important;
    }
    #login {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 20px;
      z-index: 10;
    }
    #login h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    #login p {
      max-width: 320px;
      font-size: 13px;
      color: #aaa;
      text-align: center;
    }
    #login input {
      width: 320px;
      max-width: 90vw;
      padding: 12px 14px;
      background: #1a1a1a;
      color: var(--fg);
      border: 1px solid #333;
      border-radius: 8px;
      font: inherit;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    #login input:focus {
      outline: 2px solid var(--accent);
      border-color: var(--accent);
    }
    #login button {
      width: 320px;
      max-width: 90vw;
      padding: 12px 14px;
      background: var(--accent);
      color: white;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    #login .err {
      color: var(--error);
      font-size: 12px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div id="login">
    <h1>baton-web</h1>
    <p>Enter the bearer token configured on the server (BATON_WEB_TOKEN).</p>
    <input id="token" type="password" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="bearer token" />
    <button id="connect">Connect</button>
    <div id="login-err" class="err"></div>
  </div>
  <header style="display:none">
    <span class="title">baton-web</span>
    <span class="status disconnected" id="status">offline</span>
  </header>
  <div id="term-host" style="display:none"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="/main.js" defer></script>
</body>
</html>
